<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MobileHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

<!-- 🔥 LOADING -->
<div id="loadingSpinner"
     class="position-fixed top-0 start-0 w-100 h-100 d-none d-flex align-items-center justify-content-center bg-dark bg-opacity-25"
     style="z-index:9999;">
    <div class="spinner-border text-light"></div>
</div>

<!-- 🔥 TOAST -->
<div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

<!-- HEADER -->
<div id="header"></div>

<!-- CATEGORY OFFCANVAS -->
<div class="offcanvas offcanvas-start"
     tabindex="-1"
     id="categorySidebar">

    <div class="offcanvas-header">

        <h5 class="offcanvas-title fw-bold">
            Danh mục sản phẩm
        </h5>

        <button type="button"
                class="btn-close"
                data-bs-dismiss="offcanvas"></button>

    </div>

    <div class="offcanvas-body">

        <div id="offcanvasCategoryList"></div>

    </div>

</div>

<!-- SEARCH OVERLAY -->
<div id="searchOverlay" class="search-overlay"></div>

<main class="flex-grow-1">

    <!-- DIV 1: Layout chính -->
    <div class="container mt-3">
        <div class="row">

            <!-- LEFT: category -->
            <div class="col-lg-2">

                <div class="category-sidebar">

                    <h6 class="fw-bold mb-3">
                        Danh mục
                    </h6>

                    <div id="categoryList"></div>

                </div>

            </div>

            <!-- CENTER: banner lớn -->
            <div class="col-md-7">
                <div class="bg-secondary text-white text-center p-5">
                    Banner quảng cáo lớn
                </div>
            </div>

            <!-- RIGHT: banner nhỏ -->
            <div class="col-md-3 d-flex flex-column gap-3">
                <div class="bg-warning p-3 text-center">Banner 1</div>
                <div class="bg-info p-3 text-center">Banner 2</div>
            </div>

        </div>
    </div>

    <!-- DIV 2: 20 sản phẩm -->
    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h4 class="fw-bold">
                Sản phẩm nổi bật
            </h4>

            <a href="#"
               class="text-success text-decoration-none">
                Xem tất cả
            </a>

        </div>

        <div class="row g-3"
             id="productList"></div>

    </div>

    <!-- DIV 3: bán chạy + sale -->
    <div class="container mt-4">
        <h5>Bán chạy & Flash Sale</h5>
        <div class="row">
            <div class="col-md-3">iPhone bán chạy</div>
            <div class="col-md-3">Tablet bán chạy</div>
            <div class="col-md-3 text-danger">Flash Sale</div>
            <div class="col-md-3 text-warning">Mega Sale</div>
        </div>
    </div>

    <!-- DIV 4: categories products -->
    <div class="container mt-5">

        <h4 class="fw-bold mb-4">
            Danh mục sản phẩm
        </h4>

        <div id="brandSections"></div>

    </div>

    <!-- DIV 5: tin tức -->
    <div class="container mt-4">
        <h5>Tin công nghệ</h5>
        <div class="row">
            <div class="col-md-4">Bài viết 1</div>
            <div class="col-md-4">Bài viết 2</div>
            <div class="col-md-4">Bài viết 3</div>
        </div>
    </div>
</main>
<!-- FOOTER -->
<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="./config.js"></script>
<script src="assets/js/core/api.js"></script>
<script src="assets/js/core/auth.js"></script>
<script src="assets/js/core/utils.js"></script>
<script src="./assets/js/components/header.js"></script>
<script src="./assets/js/components/footer.js"></script>

<script src="./assets/js/models/user.model.js"></script>

<script src="./assets/js/views/user/home.view.js"></script>

<script src="./assets/js/controllers/user/home.controller.js"></script>

<script>
    Header.load();
    Footer.load();
</script>

</body>
</html>
