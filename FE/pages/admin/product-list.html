<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product list</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

<!-- LOADING -->
<div id="loadingSpinner"
     class="position-fixed top-0 start-0 w-100 h-100 d-none d-flex align-items-center justify-content-center bg-dark bg-opacity-25"
     style="z-index:9999;">
    <div class="spinner-border text-light"></div>
</div>

<!-- TOAST -->
<div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

<div class="wrapper">

    <div id="sidebar" class="sidebar"></div>

    <div class="right_col">
        <div id="navbar" class="top_nav"></div>

        <div class="content">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>
                        <h3>
                        Quản lý sản phẩm
                        </h3>
                </div>

                <button
                        class="btn btn-primary px-4"
                        onclick="ProductController.openCreate()">

                    <i class="fa fa-plus"></i>
                    Add Product
                </button>

            </div>

            <!-- ===================================================== -->
            <!-- FILTER -->
            <!-- ===================================================== -->

            <div class="card border-0 shadow-sm mb-4 rounded-4">

                <div class="card-body p-4">

                    <div class="row g-3 align-items-center">

                        <!-- SEARCH -->
                        <div class="col-lg-4 col-md-12">

                            <div class="input-group">

                    <span class="input-group-text bg-white border-end-0">
                        <i class="fa fa-search text-muted"></i>
                    </span>

                                <input
                                        id="searchInput"
                                        class="form-control border-start-0"
                                        placeholder="Search product..."
                                        onkeyup="ProductController.load()">

                            </div>

                        </div>

                        <!-- BRAND -->
                        <div class="col-lg-2 col-md-4">

                            <div class="input-group">

                    <span class="input-group-text bg-white">
                        <i class="fa fa-tag"></i>
                    </span>

                                <select
                                        id="brandFilter"
                                        class="form-select"
                                        onchange="ProductController.load()">

                                    <option value="">
                                        All Brand
                                    </option>

                                </select>

                            </div>

                        </div>

                        <!-- CATEGORY -->
                        <div class="col-lg-2 col-md-4">

                            <div class="input-group">

                    <span class="input-group-text bg-white">
                        <i class="fa fa-layer-group"></i>
                    </span>

                                <select
                                        id="categoryFilter"
                                        class="form-select"
                                        onchange="ProductController.load()">

                                    <option value="">
                                        All Category
                                    </option>

                                </select>

                            </div>

                        </div>

                        <!-- SORT -->
                        <div class="col-lg-2 col-md-4">

                            <div class="input-group">

                    <span class="input-group-text bg-white">
                        <i class="fa fa-sort"></i>
                    </span>

                                <select
                                        id="sortFilter"
                                        class="form-select"
                                        onchange="ProductController.load()">

                                    <option value="newest">
                                        Newest
                                    </option>

                                    <option value="price_asc">
                                        Price Low → High
                                    </option>

                                    <option value="price_desc">
                                        Price High → Low
                                    </option>

                                </select>

                            </div>

                        </div>

                        <!-- RESET -->
                        <div class="col-lg-2 col-md-12">

                            <button
                                    class="btn btn-outline-secondary w-100"
                                    onclick="ProductView.resetFilter()">

                                <i class="fa fa-rotate-right me-1"></i>
                                Reset

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- ===================================================== -->
            <!-- TABLE -->
            <!-- ===================================================== -->

            <div class="card">

                <div class="card-body table-responsive">

                    <table class="table table-hover align-middle">

                        <thead>

                        <tr>

                            <th>ID</th>

                            <th>Thumbnail</th>

                            <th>Name</th>

                            <th>Brand</th>

                            <th>Category</th>

                            <th>Price</th>

                            <th>Stock</th>

                            <th>SKU</th>

                            <th>Status</th>

                            <th class="text-center">
                                Action
                            </th>

                        </tr>

                        </thead>

                        <tbody id="productTable">

                        </tbody>

                    </table>

                </div>

            </div>

            <!-- ===================================================== -->
            <!-- PAGINATION -->
            <!-- ===================================================== -->

            <div id="pagination" class="d-flex gap-2"></div>

        </div>

        <!-- ===================================================== -->
        <!-- MODAL -->
        <!-- ===================================================== -->

        <!-- ================= PRODUCT MODAL ================= -->
        <div class="modal fade" id="productModal" tabindex="-1">
            <div class="modal-dialog modal-xl modal-dialog-scrollable">
                <div class="modal-content border-0 shadow">

                    <!-- HEADER -->
                    <div class="modal-header text-white">
                        <h5 class="modal-title" id="modalTitle">
                            Product
                        </h5>

                        <button type="button"
                                class="btn-close"
                                data-bs-dismiss="modal"></button>
                    </div>

                    <!-- BODY -->
                    <div class="modal-body">

                        <div class="row g-4">

                            <!-- LEFT -->
                            <div class="col-lg-8">

                                <!-- BASIC -->
                                <div class="card border-0 shadow-sm mb-4">
                                    <div class="card-header fw-bold">
                                        Basic Information
                                    </div>

                                    <div class="card-body">

                                        <div class="row g-3">

                                            <!-- NAME -->
                                            <div class="col-md-12">
                                                <label class="form-label">
                                                    Product Name
                                                </label>

                                                <input type="text"
                                                       class="form-control"
                                                       id="name">
                                            </div>

                                            <!-- BRAND -->
                                            <div class="col-md-6">
                                                <label class="form-label">
                                                    Brand
                                                </label>

                                                <select class="form-select"
                                                        id="brand">
                                                </select>
                                            </div>

                                            <!-- CATEGORY -->
                                            <div class="col-md-6">
                                                <label class="form-label">
                                                    Category
                                                </label>

                                                <select class="form-select"
                                                        id="category">
                                                </select>
                                            </div>

                                            <!-- PRICE -->
                                            <div class="col-md-4">
                                                <label class="form-label">
                                                    Price
                                                </label>

                                                <input type="text"
                                                       class="form-control"
                                                       id="price">
                                            </div>

                                            <!-- STOCK -->
                                            <div class="col-md-4">
                                                <label class="form-label">
                                                    Stock
                                                </label>

                                                <input type="number"
                                                       class="form-control"
                                                       id="stock">
                                            </div>

                                            <!-- SKU -->
                                            <div class="col-md-4">
                                                <label class="form-label">
                                                    SKU
                                                </label>

                                                <input type="text"
                                                       class="form-control"
                                                       id="sku">
                                            </div>
                                            <!-- COLOR -->
                                            <div class="col-md-4">
                                                <label class="form-label">
                                                    COLOR
                                                </label>

                                                <input type="text"
                                                       class="form-control"
                                                       id="color">
                                            </div>

                                            <div class="col-md-6">
                                                <label class="form-label">RAM</label>

                                                <input
                                                        type="text"
                                                        id="ram"
                                                        class="form-control"
                                                        placeholder="VD: 64GB">
                                            </div>

                                            <!-- DISCOUNT -->
                                            <div class="col-md-6">
                                                <label class="form-label">
                                                    Discount
                                                </label>

                                                <select class="form-select"
                                                        id="discount">
                                                </select>
                                            </div>

                                            <!-- STATUS -->
                                            <div class="col-md-6">
                                                <label class="form-label">
                                                    Status
                                                </label>

                                                <select class="form-select"
                                                        id="status">

                                                    <option value="ACTIVE">
                                                        ACTIVE
                                                    </option>

                                                    <option value="INACTIVE">
                                                        INACTIVE
                                                    </option>
                                                </select>
                                            </div>

                                            <!-- DESCRIPTION -->
                                            <div class="col-md-12">
                                                <label class="form-label">
                                                    Description
                                                </label>

                                                <textarea class="form-control"
                                                          rows="6"
                                                          id="description"></textarea>
                                            </div>

                                        </div>

                                    </div>
                                </div>

                            </div>

                            <!-- RIGHT -->
                            <div class="col-lg-4">

                                <!-- THUMBNAIL -->
                                <div class="card border-0 shadow-sm mb-4">

                                    <div class="card-header fw-bold">
                                        Thumbnail
                                    </div>

                                    <div class="card-body">

                                        <input type="file"
                                               class="form-control mb-3"
                                               id="thumbnail">

                                        <!-- PREVIEW -->
                                        <div id="thumbnailPreview"
                                             class="position-relative">
                                        </div>

                                    </div>
                                </div>

                                <!-- IMAGES -->
                                <div class="card border-0 shadow-sm">

                                    <div class="card-header fw-bold d-flex justify-content-between align-items-center">

                                        <span>Gallery Images</span>

                                        <label class="btn btn-sm btn-primary mb-0">
                                            + Add Images

                                            <input type="file"
                                                   hidden
                                                   multiple
                                                   id="images">
                                        </label>
                                    </div>

                                    <div class="card-body">

                                        <!-- PREVIEW IMAGES -->
                                        <div id="imagePreview"
                                             class="row g-2">
                                        </div>

                                    </div>
                                </div>

                            </div>

                        </div>

                    </div>

                    <!-- FOOTER -->
                    <div class="modal-footer">

                        <button class="btn btn-secondary"
                                data-bs-dismiss="modal">

                            Close
                        </button>

                        <button class="btn btn-primary"
                                id="saveBtn">

                            Save Product
                        </button>

                    </div>

                </div>
            </div>
        </div>

        <!-- =========================================
PRODUCT DETAIL MODAL
========================================= -->

        <div class="modal fade"
             id="productDetailModal"
             tabindex="-1">

            <div class="modal-dialog modal-xl modal-dialog-centered">

                <div class="modal-content border-0 shadow-lg">

                    <!-- HEADER -->
                    <div class="modal-header text-white">

                        <h5 class="modal-title">
                            <i class="fa fa-box me-2"></i>
                            Chi tiết sản phẩm
                        </h5>

                        <button type="button"
                                class="btn-close"
                                data-bs-dismiss="modal">
                        </button>

                    </div>

                    <!-- BODY -->
                    <div class="modal-body">

                        <div class="row">

                            <!-- LEFT -->
                            <div class="col-md-5">

                                <!-- CAROUSEL -->
                                <div id="productCarousel"
                                     class="carousel slide mb-3"
                                     data-bs-ride="carousel">

                                    <div class="carousel-inner"
                                         id="productCarouselInner">

                                    </div>

                                    <button class="carousel-control-prev"
                                            type="button"
                                            data-bs-target="#productCarousel"
                                            data-bs-slide="prev">

                                        <span class="carousel-control-prev-icon"></span>
                                    </button>

                                    <button class="carousel-control-next"
                                            type="button"
                                            data-bs-target="#productCarousel"
                                            data-bs-slide="next">

                                        <span class="carousel-control-next-icon"></span>
                                    </button>

                                </div>

                                <!-- THUMBNAILS -->
                                <div class="row g-2"
                                     id="productThumbs">

                                </div>

                            </div>

                            <!-- RIGHT -->
                            <div class="col-md-7">

                                <h3 id="detailName"
                                    class="fw-bold mb-3">
                                </h3>

                                <div class="mb-3">

                            <span class="badge bg-primary me-2"
                                  id="detailBrand">
                            </span>

                                    <span class="badge bg-secondary"
                                          id="detailCategory">
                            </span>

                                </div>

                                <!-- PRICE -->
                                <div class="mb-4">

                                    <div class="text-muted text-decoration-line-through"
                                         id="detailOldPrice">
                                    </div>

                                    <div class="fs-2 fw-bold text-danger"
                                         id="detailPrice">
                                    </div>

                                </div>

                                <!-- INFO -->
                                <div class="row g-3 mb-4">

                                    <div class="col-md-6">

                                        <div class="border rounded p-3">

                                            <div class="text-muted small">
                                                SKU
                                            </div>

                                            <div class="fw-semibold"
                                                 id="detailSku">
                                            </div>

                                        </div>

                                    </div>

                                    <div class="col-md-6">

                                        <div class="border rounded p-3">

                                            <div class="text-muted small">
                                                Tồn kho
                                            </div>

                                            <div class="fw-semibold"
                                                 id="detailStock">
                                            </div>

                                        </div>

                                    </div>

                                    <div class="col-md-6">

                                        <div class="border rounded p-3">

                                            <div class="text-muted small">
                                                Đã bán
                                            </div>

                                            <div class="fw-semibold"
                                                 id="detailSold">
                                            </div>

                                        </div>

                                    </div>

                                    <div class="col-md-6">

                                        <div class="border rounded p-3">

                                            <div class="text-muted small">
                                                Lượt xem
                                            </div>

                                            <div class="fw-semibold"
                                                 id="detailView">
                                            </div>

                                        </div>

                                    </div>

                                    <div class="col-md-6">

                                        <div class="border rounded p-3">

                                            <div class="text-muted small">
                                                Rating
                                            </div>

                                            <div class="fw-semibold"
                                                 id="detailRating">
                                            </div>

                                        </div>

                                    </div>

                                    <div class="col-md-6">

                                        <div class="border rounded p-3">

                                            <div class="text-muted small">
                                                Trạng thái
                                            </div>

                                            <div id="detailStatus">
                                            </div>

                                        </div>

                                    </div>

                                    <div class="col-md-6">

                                        <div class="border rounded p-3">

                                            <div class="text-muted small">
                                                Màu Sắc
                                            </div>

                                            <div id="detailColor">
                                            </div>

                                        </div>

                                    </div>

                                    <div class="col-md-6">

                                        <div class="border rounded p-3">

                                            <div class="text-muted small">
                                                RAM
                                            </div>

                                            <div id="detailRam">
                                            </div>

                                        </div>

                                    </div>

                                </div>

                                <!-- DESCRIPTION -->
                                <div>

                                    <h5 class="fw-bold mb-3">
                                        Mô tả sản phẩm
                                    </h5>

                                    <div class="border rounded p-3 bg-light"
                                         id="detailDescription"
                                         style="white-space:pre-line">
                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>
</div>

<!-- ================= SCRIPTS ================= -->

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- CORE -->
<script src="../../config.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/auth.js"></script>
<script src="../../assets/js/core/utils.js"></script>

<!-- MODEL -->
<script src="../../assets/js/models/admin.model.js"></script>
<script src="../../assets/js/models/user.model.js"></script>

<!-- VIEW -->
<script src="../../assets/js/views/admin/product-view.js"></script>

<!-- CONTROLLER -->
<script src="../../assets/js/controllers/admin/product-controller.js"></script>

<!-- COMPONENT -->
<script src="../../assets/js/components/navbar.js"></script>
<script src="../../assets/js/components/sidebar.js"></script>

<script>
    Navbar.load();
    Sidebar.load();
</script>

</body>
</html>
