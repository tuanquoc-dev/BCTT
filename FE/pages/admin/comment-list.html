<!doctype html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Quản lý bình luận</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- FONT AWESOME -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="../../assets/css/style.css">

</head>

<body>

<!-- LOADING -->
<div id="loadingSpinner"
     class="position-fixed top-0 start-0 w-100 h-100 d-none d-flex align-items-center justify-content-center bg-dark bg-opacity-25"
     style="z-index:9999;">

    <div class="spinner-border text-light"></div>

</div>

<!-- TOAST -->
<div class="toast-container position-fixed top-0 end-0 p-3"
     id="toastContainer">
</div>

<div class="wrapper">

    <!-- SIDEBAR -->
    <div id="sidebar"
         class="sidebar">
    </div>

    <div class="right_col">

        <!-- NAVBAR -->
        <div id="navbar"
             class="top_nav">
        </div>

        <!-- CONTENT -->
        <div class="content">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>

                    <h3>
                        Quản lý bình luận
                    </h3>

                </div>

            </div>

            <!-- ===================================================== -->
            <!-- FILTER -->
            <!-- ===================================================== -->

            <div class="card border-0 shadow-sm mb-4 rounded-4">

                <div class="card-body p-4">

                    <div class="row g-3 align-items-center">

                        <!-- SEARCH -->
                        <div class="col-lg-5">

                            <div class="input-group">

                                <span class="input-group-text bg-white border-end-0">
                                    <i class="fa fa-search text-muted"></i>
                                </span>

                                <input type="text"
                                       id="searchInput"
                                       class="form-control border-start-0"
                                       placeholder="Tìm theo username..."
                                       onkeyup="CommentController.load()">

                            </div>

                        </div>

                        <!-- STATUS -->
                        <div class="col-lg-3">

                            <div class="input-group">

                                <span class="input-group-text bg-white">
                                    <i class="fa fa-filter"></i>
                                </span>

                                <select id="statusFilter"
                                        class="form-select"
                                        onchange="CommentController.load()">

                                    <option value="">
                                        Tất cả trạng thái
                                    </option>

                                    <option value="APPROVED">
                                        APPROVED
                                    </option>

                                    <option value="HIDDEN">
                                        HIDDEN
                                    </option>

                                </select>

                            </div>

                        </div>

                        <!-- RESET -->
                        <div class="col-lg-2">

                            <button class="btn btn-outline-secondary w-100"
                                    onclick="CommentView.resetFilter()">

                                <i class="fa fa-rotate-right me-1"></i>
                                Reset

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- ===================================================== -->
            <!-- TABLE -->
            <!-- ===================================================== -->

            <div class="card border-0 shadow-sm rounded-4">

                <div class="card-body table-responsive">

                    <table class="table table-hover align-middle">

                        <thead>

                        <tr>

                            <th>ID</th>

                            <th>User</th>

                            <th>Content</th>

                            <th>Target</th>

                            <th>Status</th>

                            <th>Created</th>

                            <th class="text-center">
                                Action
                            </th>

                        </tr>

                        </thead>

                        <tbody id="commentTable">

                        </tbody>

                    </table>

                </div>

            </div>

            <!-- PAGINATION -->
            <div id="pagination" class="mt-3"></div>

        </div>

    </div>

</div>

<!-- ===================================================== -->
<!-- DETAIL MODAL -->
<!-- ===================================================== -->

<div class="modal fade"
     id="commentDetailModal"
     tabindex="-1">

    <div class="modal-dialog modal-lg modal-dialog-centered">

        <div class="modal-content border-0 shadow">

            <!-- HEADER -->
            <div class="modal-header text-white">

                <h5 class="modal-title">

                    <i class="fa fa-comment me-2"></i>
                    Chi tiết comment

                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <!-- BODY -->
            <div class="modal-body">

                <div class="row g-4">

                    <!-- USER -->
                    <div class="col-md-6">

                        <div class="border rounded-4 p-3 h-100">

                            <div class="text-muted small mb-2">
                                Username
                            </div>

                            <div id="detailUsername"
                                 class="fw-semibold">
                            </div>

                        </div>

                    </div>

                    <!-- STATUS -->
                    <div class="col-md-6">

                        <div class="border rounded-4 p-3 h-100">

                            <div class="text-muted small mb-2">
                                Status
                            </div>

                            <div id="detailStatus"></div>

                        </div>

                    </div>

                    <!-- TARGET -->
                    <div class="col-md-6">

                        <div class="border rounded-4 p-3 h-100">

                            <div class="text-muted small mb-2">
                                Product ID
                            </div>

                            <div id="detailProduct"></div>

                        </div>

                    </div>

                    <!-- POST -->
                    <div class="col-md-6">

                        <div class="border rounded-4 p-3 h-100">

                            <div class="text-muted small mb-2">
                                Post ID
                            </div>

                            <div id="detailPost"></div>

                        </div>

                    </div>

                    <!-- CONTENT -->
                    <div class="col-12">

                        <div class="border rounded-4 p-4">

                            <div class="text-muted small mb-3">
                                Nội dung comment
                            </div>

                            <div id="detailContent"
                                 style="white-space: pre-line">
                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- FOOTER -->
            <div class="modal-footer">

                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">

                    Close

                </button>

            </div>

        </div>

    </div>

</div>

<!-- ===================================================== -->
<!-- SCRIPTS -->
<!-- ===================================================== -->

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<!-- CORE -->
<script src="../../config.js"></script>

<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/auth.js"></script>
<script src="../../assets/js/core/utils.js"></script>

<!-- MODEL -->
<script src="../../assets/js/models/admin.model.js"></script>
<script src="../../assets/js/models/auth.model.js"></script>
<script src="../../assets/js/models/user.model.js"></script>

<!-- VIEW -->
<script src="../../assets/js/views/admin/comment.view.js"></script>
<script src="../../assets/js/views/admin/notify.view.js"></script>
<script src="../../assets/js/controllers/admin/notify.controller.js"></script>

<!-- CONTROLLER -->
<script src="../../assets/js/controllers/admin/comment.controller.js"></script>

<!-- COMPONENT -->
<script src="../../assets/js/components/navbar.js"></script>
<script src="../../assets/js/components/sidebar.js"></script>

<script>

    Navbar.load();
    Sidebar.load();

</script>

</body>

</html>
