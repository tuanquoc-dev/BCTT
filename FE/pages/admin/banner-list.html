<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Quản lý banner</title>

    <!-- BOOTSTRAP -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <!-- FONT AWESOME -->
    <link
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
            rel="stylesheet"
    >

    <!-- CUSTOM CSS -->
    <link
            rel="stylesheet"
            href="../../assets/css/style.css"
    >

</head>

<body>

<!-- LOADING -->
<div id="loadingSpinner"
     class="position-fixed top-0 start-0 w-100 h-100 d-none d-flex align-items-center justify-content-center bg-dark bg-opacity-25"
     style="z-index:9999;">

    <div class="spinner-border text-light"></div>

</div>

<!-- TOAST -->
<div
        class="toast-container position-fixed top-0 end-0 p-3"
        id="toastContainer">
</div>

<div class="wrapper">

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar"></div>

    <div class="right_col">

        <!-- NAVBAR -->
        <div id="navbar" class="top_nav"></div>

        <!-- CONTENT -->
        <div class="content">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>

                    <h3>Quản lý banner</h3>

                </div>

                <button
                        class="btn btn-primary"
                        onclick="BannerController.openCreateModal()">

                    <i class="fa fa-plus me-2"></i>

                    Tạo Banner

                </button>

            </div>

            <!-- FILTER -->
            <div class="card border-0 shadow-sm mb-4 rounded-4">

                <div class="card-body p-4">

                    <div class="row g-3 align-items-center">

                        <!-- SEARCH -->
                        <div class="col-lg-5 col-md-12">

                            <div class="input-group">

                                <span class="input-group-text bg-white border-end-0">

                                    <i class="fa fa-search text-muted"></i>

                                </span>

                                <input
                                        id="searchInput"
                                        class="form-control border-start-0"
                                        placeholder="Tìm kiếm banner theo tên..."
                                >

                            </div>

                        </div>

                        <!-- STATUS -->
                        <div class="col-lg-4 col-md-6">

                            <div class="input-group">

                                <span class="input-group-text bg-white">

                                    <i class="fa fa-filter"></i>

                                </span>

                                <select
                                        id="statusFilter"
                                        class="form-select">

                                    <option value="">
                                        Tất cả trạng thái
                                    </option>

                                    <option value="1">
                                        Đang hiển thị
                                    </option>

                                    <option value="0">
                                        Đã ẩn
                                    </option>

                                </select>

                            </div>

                        </div>

                        <!-- RESET -->
                        <div class="col-lg-3 col-md-6">

                            <button
                                    class="btn btn-outline-secondary w-100"
                                    onclick="BannerController.resetFilter()">

                                <i class="fa fa-rotate-right me-1"></i>

                                Làm mới

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- TABLE -->
            <div class="card border-0 shadow-sm rounded-4">

                <div class="card-body table-responsive">

                    <table
                            class="table table-hover align-middle text-center">

                        <thead>

                        <tr>

                            <th>ID</th>

                            <th>Hình ảnh</th>

                            <th>Tên banner</th>

                            <th>Vị trí</th>

                            <th>Loại</th>

                            <th>Thứ tự</th>

                            <th>Trạng thái</th>

                            <th>Thao tác</th>

                        </tr>

                        </thead>

                        <tbody id="bannerTableBody"></tbody>

                    </table>

                </div>

            </div>

            <!-- PAGINATION -->
            <div
                    id="pagination"
                    class="mt-3">
            </div>

        </div>

    </div>

</div>

<!-- MODAL -->
<div
        class="modal fade"
        id="bannerModal"
        tabindex="-1">

    <div class="modal-dialog modal-lg modal-dialog-centered">

        <div class="modal-content border-0 shadow-lg">

            <div class="modal-header">

                <h5
                        class="modal-title"
                        id="bannerModalTitle">

                    Tạo banner

                </h5>

                <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <form id="bannerForm">

                    <div class="row">

                        <!-- NAME -->
                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Tên banner
                            </label>

                            <input
                                    id="name"
                                    class="form-control"
                                    required
                            >

                        </div>

                        <!-- POSITION -->
                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Vị trí
                            </label>

                            <input
                                    id="position"
                                    class="form-control"
                            >

                        </div>

                        <!-- THUMBNAIL -->
                        <div class="col-md-12 mb-3">

                            <label class="form-label">
                                Ảnh banner
                            </label>

                            <input
                                    id="thumbnail"
                                    type="file"
                                    class="form-control"
                                    accept="image/*"
                            >

                        </div>

                        <!-- LINK -->
                        <div class="col-md-12 mb-3">

                            <label class="form-label">
                                Liên kết chuyển hướng
                            </label>

                            <input
                                    id="link"
                                    class="form-control"
                            >

                        </div>

                        <!-- TYPE -->
                        <div class="col-md-4 mb-3">

                            <label class="form-label">
                                Loại banner
                            </label>

                            <input
                                    id="type"
                                    class="form-control"
                            >

                        </div>

                        <!-- SORT -->
                        <div class="col-md-4 mb-3">

                            <label class="form-label">
                                Thứ tự hiển thị
                            </label>

                            <input
                                    id="sortOrder"
                                    type="number"
                                    class="form-control"
                                    value="0"
                            >

                        </div>

                        <!-- STATUS -->
                        <div class="col-md-4 mb-3">

                            <label class="form-label">
                                Trạng thái
                            </label>

                            <select
                                    id="status"
                                    class="form-select">

                                <option value="ACTIVE">
                                    Đang hiển thị
                                </option>

                                <option value="INACTIVE">
                                    Đã ẩn
                                </option>

                            </select>

                        </div>

                        <!-- START -->
                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Ngày bắt đầu
                            </label>

                            <input
                                    id="startDate"
                                    type="datetime-local"
                                    class="form-control"
                            >

                        </div>

                        <!-- END -->
                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Ngày kết thúc
                            </label>

                            <input
                                    id="endDate"
                                    type="datetime-local"
                                    class="form-control"
                            >

                        </div>

                        <!-- PREVIEW -->
                        <div class="col-md-12">

                            <img
                                    id="thumbnailPreview"
                                    src="https://placehold.co/1200x300?text=Xem+trước+Banner"
                                    class="img-fluid rounded border"
                            >

                        </div>

                    </div>

                </form>

            </div>

            <div class="modal-footer">

                <button
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">

                    Đóng

                </button>

                <button
                        class="btn btn-primary"
                        onclick="BannerController.submit()">

                    Lưu banner

                </button>

            </div>

        </div>

    </div>

</div>

<!-- AXIOS -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<!-- BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- DAYJS -->
<script src="https://cdn.jsdelivr.net/npm/dayjs/dayjs.min.js"></script>

<!-- CONFIG -->
<script src="../../config.js"></script>

<!-- CORE -->
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/auth.js"></script>
<script src="../../assets/js/core/utils.js"></script>

<script src="../../assets/js/models/auth.model.js"></script>
<script src="../../assets/js/views/auth/notification.view.js"></script>
<script src="../../assets/js/controllers/auth/notification.controller.js"></script>

<!-- MODEL -->
<script src="../../assets/js/models/admin.model.js"></script>
<script src="../../assets/js/models/user.model.js"></script>

<!-- VIEW -->
<script src="../../assets/js/views/admin/banner.view.js"></script>

<!-- CONTROLLER -->
<script src="../../assets/js/controllers/admin/banner.controller.js"></script>

<!-- COMPONENT -->
<script src="../../assets/js/components/navbar.js"></script>
<script src="../../assets/js/components/sidebar.js"></script>

<script>

    Navbar.load();

    Sidebar.load();

</script>

</body>
</html>
