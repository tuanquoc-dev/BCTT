<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>ListUser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>


<div class="wrapper">

    <div id="sidebar" class="sidebar"></div>

    <div class="right_col">
        <div id="navbar" class="top_nav"></div>

        <div class="content p-4">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>
                    <h3>
                        Quản lý Người dùng
                    </h3>
                </div>

                <button
                        id="createStaffBtn"
                        class="btn btn-primary px-4">

                    <i class="fa fa-plus"></i>
                    Thêm nhân viên
                </button>

            </div>

            <!-- FILTER -->
            <div class="card border-0 shadow-sm mb-4 rounded-4">

                <div class="card-body p-4">

                    <div class="row g-3 align-items-center">

                        <!-- SEARCH -->
                        <div class="col-lg-9 col-md-12">

                            <div class="input-group">

                    <span class="input-group-text bg-white border-end-0">
                        <i class="fa fa-search text-muted"></i>
                    </span>

                                <input
                                        id="searchInput"
                                        class="form-control border-start-0"
                                        placeholder="Tìm kiếm tên...">

                            </div>

                        </div>

                        <!-- RESET -->
                        <div class="col-lg-3 col-md-12">

                            <button
                                    class="btn btn-outline-secondary w-100"
                                    onclick="UserView.resetFilter()">

                                <i class="fa fa-rotate-right me-1"></i>
                                làm lại

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- TABLE -->
            <div class="card">

                <div class="card-body table-responsive">

                    <table class="table table-hover align-middle">
                        <tr>
                            <th>ID</th>
                            <th>Tên</th>
                            <th>Họ và tên</th>
                            <th>Email</th>
                            <th>Số điện thoại</th>
                            <th>Ngày sinh</th>
                            <th>Địa chỉ</th>
                            <th>Vai trò</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>

                        <tbody id="userTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="pagination" class="d-flex gap-2"></div>

        </div>

        <!-- EDIT USER MODAL -->
        <div class="modal fade" id="editUserModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title">Thông tin người dùng</h5>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <input type="hidden" id="editId">

                        <div class="mb-2">
                            <label>Tên</label>
                            <input id="editUsername" class="form-control" disabled>
                        </div>

                        <div class="mb-2">
                            <label>Họ và tên</label>
                            <input id="editFullName" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label>Email</label>
                            <input id="editEmail" class="form-control" disabled>
                        </div>

                        <div class="mb-2">
                            <label>Số điện thoại</label>
                            <input id="editPhone" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label>Ngày sinh</label>
                            <input id="editAge" type="date" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label>Địa chỉ</label>
                            <input id="editAddress" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label>Trạng thái</label>
                            <select id="editStatus" class="form-control">
                                <option value="ACTIVE">Hoạt động</option>
                                <option value="BLOCKED">Ngừng hoạt động</option>
                            </select>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button id="saveUserBtn" class="btn btn-primary">Lưu</button>
                    </div>

                </div>
            </div>
        </div>

        <!-- CREATE STAFF MODAL -->
        <div class="modal fade" id="createStaffModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title">Thêm nhân viên</h5>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <div class="mb-2">
                            <label>Tên</label>
                            <input id="createUsername" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label>Email</label>
                            <input id="createEmail" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label>Mật khẩu</label>
                            <input id="createPassword" type="password" class="form-control">
                        </div>

                        <!-- KHÔNG cần chọn role -->
                        <input type="hidden" id="createRole" value="STAFF">

                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button id="saveStaffBtn" class="btn btn-primary">Lưu</button>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>

<!-- LOADING -->
<div id="loadingSpinner"
     class="position-fixed top-0 start-0 w-100 h-100 d-none d-flex align-items-center justify-content-center bg-dark bg-opacity-25">
    <div class="spinner-border text-light"></div>
</div>

<!-- TOAST -->
<div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

<!-- LIB -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<!-- CORE -->
<script src="../../config.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/auth.js"></script>
<script src="../../assets/js/core/utils.js"></script>

<script src="../../assets/js/models/auth.model.js"></script>
<script src="../../assets/js/views/auth/notification.view.js"></script>
<script src="../../assets/js/controllers/auth/notification.controller.js"></script>

<!-- MODEL -->
<script src="../../assets/js/models/admin.model.js"></script>
<script src="../../assets/js/models/user.model.js"></script>

<!-- COMPONENT -->
<script src="../../assets/js/components/navbar.js"></script>
<script src="../../assets/js/components/sidebar.js"></script>

<!-- MVC -->
<script src="../../assets/js/views/admin/user.view.js"></script>
<script src="../../assets/js/views/admin/notify.view.js"></script>
<script src="../../assets/js/controllers/admin/user.controller.js"></script>
<script src="../../assets/js/controllers/admin/notify.controller.js"></script>

<script>
    Navbar.load();
    Sidebar.load();
</script>

</body>
</html>
