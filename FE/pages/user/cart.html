<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng | MobileHub</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- FONT AWESOME -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="../../assets/css/style.css">

    <style>

        body{
            background:#f5f5f7;
        }

        .cart-box{
            background:#fff;
            border-radius:16px;
            padding:20px;
            box-shadow:0 2px 10px rgba(0,0,0,.04);
        }

        .cart-item{
            border-bottom:1px solid #eee;
            padding:20px 0;
        }

        .cart-item:last-child{
            border-bottom:none;
        }

        .product-image{
            width:100px;
            height:100px;
            object-fit:contain;
            border-radius:12px;
            background:#fff;
            border:1px solid #eee;
        }

        .product-name{
            font-size:16px;
            font-weight:600;
            color:#222;
            text-decoration:none;
        }

        .product-name:hover{
            color:#d70018;
        }

        .variant-badge{
            display:inline-block;
            background:#f3f4f6;
            border-radius:8px;
            padding:4px 10px;
            font-size:13px;
            margin-top:8px;
        }

        .price-final{
            color:#d70018;
            font-size:20px;
            font-weight:700;
        }

        .summary-box{
            position:sticky;
            top:20px;
            background:#fff;
            border-radius:16px;
            padding:20px;
            box-shadow:0 2px 10px rgba(0,0,0,.04);
        }

        .summary-row{
            display:flex;
            justify-content:space-between;
            margin-bottom:12px;
        }

        .summary-total{
            font-size:24px;
            font-weight:700;
            color:#d70018;
        }

        .btn-checkout{
            height:50px;
            border-radius:12px;
            font-weight:700;
            font-size:17px;
        }

        .empty-cart{
            background:#fff;
            border-radius:16px;
            padding:60px 20px;
            text-align:center;
        }

        .empty-cart i{
            font-size:70px;
            color:#d70018;
        }

    </style>
</head>

<body class="d-flex flex-column min-vh-100">

<!-- LOADING -->
<div id="loadingSpinner"
     class="position-fixed top-0 start-0 w-100 h-100 d-none d-flex align-items-center justify-content-center bg-dark bg-opacity-25"
     style="z-index:9999;">

    <div class="spinner-border text-light"></div>

</div>

<!-- TOAST -->
<div class="toast-container position-fixed top-0 end-0 p-3"
     id="toastContainer"></div>

<!-- HEADER -->
<div id="header"></div>

<main class="flex-grow-1 py-4">

    <div class="container">

        <!-- BREADCRUMB -->
        <nav class="mb-3">

            <ol class="breadcrumb mb-0">

                <li class="breadcrumb-item">
                    <a href="../../index.html"
                       class="text-decoration-none">
                        Trang chủ
                    </a>
                </li>

                <li class="breadcrumb-item active">
                    Giỏ hàng
                </li>

            </ol>

        </nav>

        <!-- TITLE -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <h3 class="fw-bold mb-0">
                Giỏ hàng
            </h3>

            <span class="text-muted"
                  id="cartCountText">

                0 sản phẩm

            </span>

        </div>

        <div class="row g-4">

            <!-- LEFT -->
            <div class="col-lg-8">

                <!-- EMPTY -->
                <div id="emptyCart"
                     class="empty-cart d-none">

                    <i class="fa-solid fa-cart-shopping mb-3"></i>

                    <h4 class="fw-bold">
                        Giỏ hàng của bạn đang trống
                    </h4>

                    <p class="text-muted mb-4">
                        Hãy chọn thêm sản phẩm để tiếp tục mua sắm
                    </p>

                    <a href="../../index.html"
                       class="btn btn-danger px-4">

                        Mua sắm ngay

                    </a>

                </div>

                <!-- CART LIST -->
                <div id="cartContainer"
                     class="cart-box">

                </div>

            </div>

            <!-- RIGHT -->
            <div class="col-lg-4">

                <div id="cartSummary"
                     class="summary-box">

                </div>

            </div>

        </div>

    </div>

</main>

<!-- FOOTER -->
<div id="footer"></div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../../config.js"></script>

<script src="../../assets/js/core/api.js"></script>

<script src="../../assets/js/core/auth.js"></script>

<script src="../../assets/js/core/utils.js"></script>

<script src="../../assets/js/utils/cart.storage.js"></script>

<script src="../../assets/js/components/header.js"></script>

<script src="../../assets/js/components/footer.js"></script>

<script src="../../assets/js/models/user.model.js"></script>

<script src="../../assets/js/service/location.service.js"></script>

<script src="../../assets/js/views/user/cart.view.js"></script>

<script src="../../assets/js/controllers/user/cart.controller.js"></script>

<script>
    Header.load();
    Footer.load();
</script>

</body>
</html>
