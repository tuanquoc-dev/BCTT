<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Chi tiết sản phẩm</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FONT AWESOME -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../../assets/css/style.css">

</head>

<body class="d-flex flex-column min-vh-100">

<!-- LOADING -->
<div id="loadingSpinner"
     class="position-fixed top-0 start-0 w-100 h-100 d-none d-flex align-items-center justify-content-center bg-dark bg-opacity-25"
     style="z-index:9999;">

    <div class="spinner-border text-light"></div>

</div>

<!-- TOAST -->
<div class="toast-container position-fixed top-0 end-0 p-3"
     id="toastContainer"></div>

<!-- HEADER -->
<div id="header"></div>

<!-- SEARCH OVERLAY -->
<div id="searchOverlay" class="search-overlay"></div>

<!-- MAIN -->
<main class="flex-grow-1">

    <div class="container my-5">

        <div class="row g-5">

            <!-- LEFT -->
            <div class="col-lg-6">

                <!-- CAROUSEL -->
                <div id="productCarousel"
                     class="carousel slide">

                    <div class="carousel-inner"
                         id="carouselImages">

                    </div>

                    <!-- THUMBNAILS -->
                    <div
                            id="carouselThumbs"
                            class="d-flex gap-2 mt-3 flex-wrap">
                    </div>

                    <button class="carousel-control-prev"
                            type="button"
                            data-bs-target="#productCarousel"
                            data-bs-slide="prev">

                        <span class="carousel-control-prev-icon bg-dark rounded-circle"></span>

                    </button>

                    <button class="carousel-control-next"
                            type="button"
                            data-bs-target="#productCarousel"
                            data-bs-slide="next">

                        <span class="carousel-control-next-icon bg-dark rounded-circle"></span>

                    </button>

                </div>

            </div>

            <!-- RIGHT -->
            <div class="col-lg-6">

                <!-- NAME -->
                <h2 id="productName"
                    class="fw-bold mb-3"></h2>

                <!-- RATING -->
                <div class="mb-3">

                    <span class="text-warning">
                        <i class="fa-solid fa-star"></i>
                    </span>

                    <span id="productRating"></span>

                    <span class="text-muted ms-3">
                        Đã bán:
                        <span id="soldQuantity"></span>
                    </span>

                </div>

                <!-- PRICE -->
                <div class="mb-4">

                    <div class="fw-bold mb-2">
                        Phiên bản
                    </div>

                    <div id="variantColors"
                         class="d-flex gap-2 flex-wrap">
                    </div>

                    <span id="finalPrice"
                          class="text-danger fw-bold fs-2"></span>

                    <span id="price"
                          class="text-muted text-decoration-line-through ms-3 fs-5"></span>

                </div>

                <!-- INFO -->
                <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">

                    <h5 class="fw-bold mb-4">
                        Thông tin sản phẩm
                    </h5>

                    <div class="row mb-3">

                        <div class="col-4 text-muted">
                            RAM
                        </div>

                        <div class="col-8 fw-semibold"
                             id="productRam"></div>

                    </div>


                    <div class="row mb-3">

                        <div class="col-4 text-muted">
                            Màu sắc
                        </div>

                        <div class="col-8">

                            <div id="productColor"
                                 class="d-flex gap-2 flex-wrap">
                            </div>

                        </div>

                    </div>

                    <div class="row mb-3">

                        <div class="col-4 text-muted">
                            Thương hiệu
                        </div>

                        <div class="col-8 fw-semibold"
                             id="brandName"></div>

                    </div>

                    <div class="row mb-3">

                        <div class="col-4 text-muted">
                            Danh mục
                        </div>

                        <div class="col-8 fw-semibold"
                             id="categoryName"></div>

                    </div>

                    <div class="row">

                        <div class="col-4 text-muted">
                            Tồn kho
                        </div>

                        <div class="col-8 fw-semibold"
                             id="productStock"></div>

                    </div>

                </div>

                <!-- BUTTON -->
                <div class="d-flex gap-3">

                    <button id="addToCartBtn" class="btn btn-success btn-lg flex-grow-1 rounded-3">

                        <i class="fa-solid fa-cart-shopping"></i>

                        Mua ngay

                    </button>

                    <button class="btn btn-outline-danger btn-lg rounded-3">

                        <i class="fa-regular fa-heart"></i>

                    </button>

                </div>

            </div>

        </div>

        <!-- DESCRIPTION -->
        <div class="mt-5">

            <div class="card border-0 shadow-sm rounded-4 p-4">

                <h4 class="fw-bold mb-4">
                    Mô tả sản phẩm
                </h4>

                <div id="productDescription"
                     class="lh-lg text-secondary"></div>

            </div>

        </div>

        <!-- REVIEW -->
        <div class="mt-5">

            <div class="card border-0 shadow-sm rounded-4 p-4">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <div>

                        <h4 class="fw-bold mb-1">
                            Đánh giá sản phẩm
                        </h4>

                        <div>

                    <span class="text-warning fs-5">
                        <i class="fa-solid fa-star"></i>
                    </span>

                            <span id="avgStar"
                                  class="fw-bold fs-5">
                        0
                    </span>

                            <span class="text-muted ms-2">
                        (
                        <span id="totalReview">
                            0
                        </span>
                        đánh giá )
                    </span>

                        </div>

                    </div>

                </div>

                <!-- FILTER -->
                <div class="d-flex gap-2 flex-wrap mb-4">

                    <button class="btn btn-outline-danger review-filter active"
                            data-star="">
                        Tất cả
                    </button>

                    <button class="btn btn-outline-danger review-filter"
                            data-star="5">
                        5 Sao
                    </button>

                    <button class="btn btn-outline-danger review-filter"
                            data-star="4">
                        4 Sao
                    </button>

                    <button class="btn btn-outline-danger review-filter"
                            data-star="3">
                        3 Sao
                    </button>

                    <button class="btn btn-outline-danger review-filter"
                            data-star="2">
                        2 Sao
                    </button>

                    <button class="btn btn-outline-danger review-filter"
                            data-star="1">
                        1 Sao
                    </button>

                </div>

                <!-- LIST -->
                <div id="reviewContainer"></div>

            </div>

        </div>

    </div>

</main>

<!-- FOOTER -->
<div id="footer"></div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../../config.js"></script>

<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/auth.js"></script>
<script src="../../assets/js/core/utils.js"></script>
<script src="../../assets/js/utils/cart.storage.js"></script>
<script src="../../assets/js/components/header.js"></script>
<script src="../../assets/js/components/footer.js"></script>

<script src="../../assets/js/models/user.model.js"></script>

<script src="../../assets/js/views/user/review.view.js"></script>

<script src="../../assets/js/controllers/user/review.controller.js"></script>

<script src="../../assets/js/views/user/detail.view.js"></script>

<script src="../../assets/js/controllers/user/detail.controller.js"></script>

<script>

    Header.load();
    Footer.load();

</script>

</body>

</html>
