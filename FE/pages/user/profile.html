<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Hồ sơ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../../assets/css/style.css" rel="stylesheet">

    <style>
        body { background: #f5f7fa; }

        .sidebar, .content-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
        }

        .avatar-box {
            text-align: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 3px solid #ddd;
            transition: 0.3s;
        }

        .avatar:hover {
            opacity: 0.8;
        }

        .menu-item {
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
        }

        .menu-item.active, .menu-item:hover {
            background: #0d6efd;
            color: white;
        }
    </style>
</head>

<body>

<div id="loadingSpinner"
     class="position-fixed top-0 start-0 w-100 h-100 d-none d-flex align-items-center justify-content-center bg-dark bg-opacity-25"
     style="z-index:9999;">
    <div class="spinner-border text-light"></div>
</div>

<div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

<!-- HEADER -->
<div id="header"></div>

<div class="container my-4">
    <div class="row g-4">

        <!-- LEFT -->
        <div class="col-md-3">
            <div class="sidebar text-center">

                <img id="avatarPreview" class="avatar mb-3" src="https://via.placeholder.com/120">

                <h5 id="username">User</h5>

                <input type="file" id="avatarInput" hidden>

                <hr>

                <div id="menuProfile" class="menu-item active">👤 Hồ sơ</div>
                <div id="menuPassword" class="menu-item">🔐 Đổi mật khẩu</div>

            </div>
        </div>

        <!-- MAIN -->
        <div class="col-md-9">

            <!-- PROFILE -->
            <div id="profileContent" class="content-box">

                <h5>Thông tin cá nhân</h5>

                <form id="profileForm">

                    <input id="email" class="form-control mb-3" placeholder="Email">

                    <input id="phone" class="form-control mb-3" placeholder="SĐT">

                    <input id="address" class="form-control mb-3" placeholder="Địa chỉ">

                    <button type="submit" class="btn btn-primary w-100">
                        💾 Lưu thay đổi
                    </button>

                </form>
            </div>

            <!-- PASSWORD -->
            <div id="passwordContent" class="content-box d-none">

                <h5>Đổi mật khẩu</h5>

                <form id="passwordForm">

                    <input id="oldPassword" type="password" class="form-control mb-3" placeholder="Mật khẩu cũ">
                    <input id="newPassword" type="password" class="form-control mb-3" placeholder="Mật khẩu mới">
                    <input id="confirmPassword" type="password" class="form-control mb-3" placeholder="Nhập lại">

                    <button type="submit" class="btn btn-warning w-100">
                        🔐 Đổi mật khẩu
                    </button>

                </form>
            </div>

        </div>
    </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- LIB -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- CORE -->
<script src="../../config.js"></script>
<script src="../../assets/js/common/api.js"></script>
<script src="../../assets/js/common/auth.js"></script>
<script src="../../assets/js/common/utils.js"></script>

<!-- COMPONENT -->
<script src="../../assets/js/components/header.js"></script>

<!-- PAGE -->
<script src="../../assets/js/user/profile.js"></script>

<script>
    Header.load();

    fetch("../../components/footer.html")
        .then(res => res.text())
        .then(html => document.getElementById("footer").innerHTML = html);
</script>

</body>
</html>
