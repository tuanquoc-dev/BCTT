<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <title>Register</title>
    <style>
        .register-bg {
            background: linear-gradient(135deg, #2A3F54 0%, #34495e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
    </style>
</head>

<body class="register-bg">

    <!-- loading + toast -->
    <div id="loadingSpinner"
        class="position-fixed top-0 start-0 w-100 h-100 d-none d-flex align-items-center justify-content-center bg-dark bg-opacity-25"
        style="z-index:9999;">
        <div class="spinner-border text-light"></div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

    <div class="card p-4 shadow" style="width: 416px;">

        <!-- Header -->
        <div class="text-center mb-4">
            <h3 class="fw-bold mb-2">MobileHub</h3>
            <p class="text-muted mb-0">Register to your account</p>
        </div>

        <!-- Form -->
        <form id="registerForm">

            <!-- Username -->
            <div class="mb-3">
                <div class="input-group login-input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="fas fa-user text-muted"></i>
                    </span>
                    <input id="regUsername" class="form-control border-start-0 ps-0 form-control-lg"
                        placeholder="Username" required>
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <div class="input-group login-input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="fas fa-envelope text-muted"></i>
                    </span>
                    <input id="regEmail" type="email" class="form-control border-start-0 ps-0 form-control-lg"
                        placeholder="Email" required>
                </div>
            </div>

            <!-- Password -->
            <div class="mb-4">
                <div class="input-group login-input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="fas fa-lock text-muted"></i>
                    </span>
                    <input id="regPassword" type="password" class="form-control border-start-0 ps-0 form-control-lg"
                        placeholder="Password" required>
                </div>
            </div>

            <!-- Button -->
            <div class="d-grid">
                <button class="btn btn-success btn-lg">
                    <i class="fas fa-user-plus me-2"></i>
                    Register
                </button>
            </div>

        </form>

        <!-- Footer -->
        <div class="text-center mt-4">
            <span class="text-muted">Already have an account?</span>
            <a href="login.html" class="ms-1">Login</a>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script src="../../config.js"></script>
    <script src="../../assets/js/common/api.js"></script>
    <script src="../../assets/js/common/utils.js"></script>

    <script src="../../assets/js/auth/register.js"></script>

</body>

</html>
