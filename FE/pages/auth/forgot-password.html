<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Forgot Password</title>

    <style>
        body {
            background: linear-gradient(135deg, #2A3F54, #34495e);
            min-height: 100vh;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<!-- loading -->
<div id="loadingSpinner" class="d-none position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-dark bg-opacity-25">
    <div class="spinner-border text-light"></div>
</div>

<!-- toast -->
<div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

<div class="card p-4 shadow" style="width:400px;">
    <h4 class="text-center mb-3">Quên mật khẩu</h4>

    <form id="forgotForm">
        <input id="email" type="email" class="form-control mb-3" placeholder="Nhập email" required>

        <button class="btn btn-warning w-100">Gửi link reset</button>
    </form>

    <div class="text-center mt-3">
        <a href="login.html">Quay lại đăng nhập</a>
    </div>
</div>

<!-- script -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script src="../../config.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/utils.js"></script>

<script src="../../assets/js/models/auth.model.js"></script>
<script src="../../assets/js/views/auth/forgot.view.js"></script>
<script src="../../assets/js/controllers/auth/forgot.controller.js"></script>

</body>
</html>
