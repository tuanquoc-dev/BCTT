<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <title>Login - MobileHub</title>

  <style>
    .login-bg {
      background: linear-gradient(135deg, #2A3F54 0%, #34495e 100%);
      min-height: 100vh;
    }

    .login-input-group .form-control,
    .login-input-group .input-group-text,
    .login-input-group .btn {
      height: 38px;
    }
  </style>
</head>

<body class="login-bg">

  <!-- 🔥 LOADING -->
  <div id="loadingSpinner"
    class="position-fixed top-0 start-0 w-100 h-100 d-none d-flex align-items-center justify-content-center bg-dark bg-opacity-25"
    style="z-index:9999;">
    <div class="spinner-border text-light"></div>
  </div>

  <!-- 🔥 TOAST -->
  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <div class="container-fluid d-flex align-items-center justify-content-center min-vh-100">
    <div class="row justify-content-center w-100">
      <div class="col-xl-4 col-lg-5 col-md-6 col-sm-8 col-10">

        <!-- Login -->
        <div class="card shadow-lg border-0">
          <div class="card-body p-5">

            <div class="text-center mb-4">
              <h3 class="fw-bold">MobileHub</h3>
              <p class="text-muted">Sign in to your account</p>
            </div>

            <form id="loginForm">

              <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group login-input-group">
                  <span class="input-group-text"><i class="fas fa-user"></i></span>
                  <input type="text" id="username" class="form-control" required>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group login-input-group">
                  <span class="input-group-text"><i class="fas fa-lock"></i></span>
                  <input type="password" id="password" class="form-control" required>
                </div>
              </div>

              <div class="d-flex justify-content-between mb-3">
                <a href="forgot-password.html">Forgot password?</a>
              </div>

              <button class="btn btn-primary w-100">Sign In</button>

            </form>

            <div class="text-center mt-3">
              <span>Don't have account?</span>
              <a href="register.html">Register</a>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- SCRIPT -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <script src="../../config.js"></script>
  <script src="../../assets/js/common/api.js"></script>
  <script src="../../assets/js/common/auth.js"></script>
  <script src="../../assets/js/common/utils.js"></script>

  <script src="../../assets/js/auth/login.js"></script>

</body>

</html>
