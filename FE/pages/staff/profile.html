<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Hồ sơ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="../../assets/css/style.css" rel="stylesheet">

    <style>
        body { background: #f5f7fa; }

        .sidebar, .content-box {
            height: 100%;
            background: white;
            border-radius: 12px;
            padding: 20px;
        }

        .row.g-4 {
            align-items: stretch;
        }

        .content-box {
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .sidebar {
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 3px solid #ddd;
            transition: 0.3s;
        }

        .avatar:hover {
            opacity: 0.8;
        }

        .menu-item {
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
        }

        .menu-item:not(.active):hover {
            background: #e7f1ff;
        }

        /* active riêng */
        .menu-item.active {
            background: #0d6efd;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

<div id="loadingSpinner"
     class="position-fixed top-0 start-0 w-100 h-100 d-none d-flex align-items-center justify-content-center bg-dark bg-opacity-25"
     style="z-index:9999;">
    <div class="spinner-border text-light"></div>
</div>

<div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

<!-- SIDEBAR -->
<div id="sidebar"></div>

<!-- TOP NAVBAR -->
<div class="top_nav">
    <div id="navbar"></div>
</div>

<div class="right_col" role="main">
    <div class="container-fluid py-4">

        <div class="row g-4">

            <!-- LEFT -->
            <div class="col-lg-3 col-md-4">
                <div class="sidebar text-center h-100">

                    <img id="avatarPreview" class="avatar mb-3"
                         src="https://via.placeholder.com/120">

                    <h5 id="username">User</h5>

                    <input type="file" id="avatarInput" hidden>

                    <hr>

                    <div id="menuProfile" class="menu-item active">👤 Hồ sơ</div>
                    <div id="menuPassword" class="menu-item">🔐 Đổi mật khẩu</div>

                </div>
            </div>

            <!-- MAIN -->
            <div class="col-lg-9 col-md-8">

                <!-- PROFILE -->
                <div id="profileContent" class="content-box mb-4">

                    <h5 class="mb-3">Thông tin cá nhân</h5>

                    <form id="profileForm">

                        <div class="row">
                            <div class="col-md-6">
                                <input id="fullName" class="form-control mb-3" placeholder="Họ tên">
                            </div>
                            <div class="col-md-6">
                                <input id="age" type="date" class="form-control mb-3">
                            </div>
                        </div>

                        <input id="email" class="form-control mb-3" placeholder="Email">
                        <input id="phone" class="form-control mb-3" placeholder="SĐT">
                        <input id="address" class="form-control mb-3" placeholder="Địa chỉ">

                        <button type="submit" class="btn btn-primary w-100">
                            💾 Lưu thay đổi
                        </button>

                    </form>
                </div>

                <!-- PASSWORD -->
                <div id="passwordContent" class="content-box d-none">

                    <h5 class="mb-3">Đổi mật khẩu</h5>

                    <form id="passwordForm">

                        <input id="oldPassword" type="password" class="form-control mb-3" placeholder="Mật khẩu cũ">
                        <input id="newPassword" type="password" class="form-control mb-3" placeholder="Mật khẩu mới">
                        <input id="confirmPassword" type="password" class="form-control mb-3" placeholder="Xác nhận mật khẩu">

                        <button type="submit" class="btn btn-primary w-100">
                            🔐 Đổi mật khẩu
                        </button>

                    </form>
                </div>

            </div>

        </div>

    </div>
</div>

<!-- LIB -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- CORE -->
<script src="../../config.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/auth.js"></script>
<script src="../../assets/js/core/utils.js"></script>

<!-- COMPONENT -->
<script src="../../assets/js/components/navbar.js"></script>
<script src="../../assets/js/components/sidebar.js"></script>

<script src="../../assets/js/models/user.model.js"></script>
<script src="../../assets/js/views/user/profile.view.js"></script>
<script src="../../assets/js/controllers/user/profile.controller.js"></script>

<script>
    Navbar.load();
    Sidebar.load();
</script>

</body>
</html>
