<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>ListUser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>



<div class="wrapper">

    <div id="sidebar" class="sidebar"></div>

    <div class="right_col">
        <div id="navbar"></div>

        <div class="content p-4">

            <h4 class="mb-3">Quản lý User</h4>

            <!-- SEARCH -->
            <div class="d-flex gap-2 mb-3">
                <input id="searchInput" class="form-control" placeholder="Tìm username...">
                <button id="searchBtn" class="btn btn-primary">Search</button>
            </div>

            <!-- TABLE -->
            <table class="table table-bordered table-hover text-center align-middler">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Age</th>
                    <th>Address</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody id="userTableBody"></tbody>
            </table>

            <div id="pagination" class="d-flex gap-2"></div>

        </div>

        <!-- EDIT USER MODAL -->
        <div class="modal fade" id="editUserModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title">Edit User</h5>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <input type="hidden" id="editId">

                        <div class="mb-2">
                            <label>Username</label>
                            <input id="editUsername" class="form-control" disabled>
                        </div>

                        <div class="mb-2">
                            <label>Full Name</label>
                            <input id="editFullName" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label>Email</label>
                            <input id="editEmail" class="form-control" disabled>
                        </div>

                        <div class="mb-2">
                            <label>Phone</label>
                            <input id="editPhone" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label>Age</label>
                            <input id="editAge" type="date" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label>Address</label>
                            <input id="editAddress" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label>Status</label>
                            <select id="editStatus" class="form-control">
                                <option value="ACTIVE">ACTIVE</option>
                                <option value="BLOCKED">BLOCKED</option>
                            </select>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button id="saveUserBtn" class="btn btn-primary">Save</button>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>

<!-- LOADING -->
<div id="loadingSpinner"
     class="position-fixed top-0 start-0 w-100 h-100 d-none d-flex align-items-center justify-content-center bg-dark bg-opacity-25">
    <div class="spinner-border text-light"></div>
</div>

<!-- TOAST -->
<div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

<!-- LIB -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- CORE -->
<script src="../../config.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/auth.js"></script>
<script src="../../assets/js/core/utils.js"></script>

<!-- MODEL -->
<script src="../../assets/js/models/admin.model.js"></script>
<script src="../../assets/js/models/user.model.js"></script>

<!-- COMPONENT -->
<script src="../../assets/js/components/navbar.js"></script>
<script src="../../assets/js/components/sidebar.js"></script>

<!-- MVC -->
<script src="../../assets/js/views/admin/user-list.view.js"></script>
<script src="../../assets/js/controllers/admin/user-list.controller.js"></script>

<script>
    Navbar.load();
    Sidebar.load();
</script>

</body>
</html>
