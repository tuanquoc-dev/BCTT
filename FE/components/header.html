<header>

  <!-- ===================================== -->
  <!-- TOP BAR -->
  <!-- ===================================== -->

  <div class="top-header py-2">

    <div class="container">

      <div class="d-flex justify-content-between align-items-center">

        <!-- LEFT -->
        <div class="small text-white">

          <i class="fa-solid fa-bolt"></i>

          Flash Sale đến 50% • Miễn phí vận chuyển toàn quốc

        </div>

        <!-- RIGHT -->
        <div class="d-flex gap-4 small">

          <!-- HOTLINE -->
          <a href="tel:0123456789"
             class="text-white text-decoration-none">

            <i class="fa-solid fa-phone"></i>

            0123 456 789

          </a>

          <!-- ORDER -->
          <a href="#"
             class="text-white text-decoration-none">

            <i class="fa-solid fa-receipt"></i>

            Tra cứu đơn hàng

          </a>

        </div>

      </div>

    </div>

  </div>



  <!-- ===================================== -->
  <!-- MAIN HEADER -->
  <!-- ===================================== -->

  <div class="main-header py-3 shadow-sm">

    <div class="container">

      <div class="d-flex align-items-center gap-3">

        <!-- LOGO -->
        <a href="/MobileHub/FE/index.html"
           class="logo text-decoration-none">

          <h3 class="m-0 fw-bold">

            <i class="fa-solid fa-mobile-screen-button"></i>

            MobileHub

          </h3>

        </a>

        <!-- CATEGORY BUTTON -->
        <div class="category-wrapper position-relative">

          <button class="btn px-3 category-btn"
                  id="categoryBtn">

            <i class="fa-solid fa-bars"></i>

            Danh mục

          </button>

          <!-- CATEGORY DROPDOWN -->
          <div id="categoryDropdown"
               class="category-dropdown d-none">

            <div class="category-grid"
                 id="categoryGrid"></div>

          </div>

        </div>

        <!-- SEARCH -->
        <div class="header-search-wrapper position-relative flex-grow-1">

          <div class="input-group">

            <input id="searchInput"
                   type="text"
                   class="form-control search-input"
                   placeholder="Bạn cần tìm gì...">

            <button class="btn">

              <i class="fa fa-search"></i>

            </button>

          </div>

          <!-- SEARCH DROPDOWN -->
          <div id="searchDropdown"
               class="search-dropdown d-none">

            <div id="searchResult"
                 class="row g-3"></div>

          </div>

        </div>

        <!-- CART -->
        <a href="/MobileHub/FE/pages/user/cart.html"
           class="position-relative">

          <i class="fa fa-shopping-cart"></i>

          <span
                  id="cartCount"
                  class="
            position-absolute
            top-0
            start-100
            translate-middle
            badge
            rounded-pill
            bg-danger
        "
          >
        0
    </span>
        </a>

        <!-- ACCOUNT -->
        <div id="accountSection">

          <!-- NOT LOGIN -->
          <a href="/MobileHub/FE/pages/auth/login.html"
             id="loginLink"
             class="header-action">

            <i class="fa-solid fa-user"></i>

            <span>Đăng nhập</span>

          </a>

          <!-- LOGIN -->
          <div id="userDropdown"
               class="dropdown d-none">

            <a class="header-action dropdown-toggle"
               href="#"
               data-bs-toggle="dropdown">

              <i class="fa-solid fa-user-circle"></i>

              <span>Tài khoản</span>

            </a>

            <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4">

              <li>

                <a class="dropdown-item"
                   href="./pages/user/profile.html">

                  <i class="fa-solid fa-id-card"></i>

                  Hồ sơ

                </a>

              </li>

              <li>

                <a class="dropdown-item"
                   href="./pages/user/my-orders.html">

                  <i class="fa-solid fa-box"></i>

                  Lịch sử đơn hàng

                </a>

              </li>

              <li>
                <hr class="dropdown-divider">
              </li>

              <li>

                <button class="dropdown-item text-danger"
                        id="logoutBtn">

                  <i class="fa-solid fa-right-from-bracket"></i>

                  Đăng xuất

                </button>

              </li>

            </ul>

          </div>

        </div>

      </div>

    </div>

  </div>

</header>
